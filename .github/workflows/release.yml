name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust-target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust-target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            rust-target: ""
          - platform: windows-latest
            args: --bundles msi
            rust-target: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          key: ${{ matrix.platform }}-${{ matrix.rust-target }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "XuYa Terminal ${{ github.ref_name }}"
          releaseBody: "Multi-platform release for Windows, macOS, and Linux. Auto-update is built in."
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          args: ${{ matrix.args }}

  sanitize-windows-updater:
    name: Sanitize Windows updater manifest
    runs-on: ubuntu-22.04
    needs: publish-tauri
    permissions:
      contents: write
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Download updater manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p release-manifest
          gh release download "${GITHUB_REF_NAME}" \
            --pattern latest.json \
            --dir release-manifest \
            --repo "${GITHUB_REPOSITORY}"

      - name: Prefer MSI for Windows updates
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("node:fs");

          const path = "release-manifest/latest.json";
          const manifest = JSON.parse(fs.readFileSync(path, "utf8"));
          if (!manifest.platforms || typeof manifest.platforms !== "object") {
            throw new Error("latest.json is missing the platforms object");
          }

          const platforms = manifest.platforms;
          if (platforms["windows-x86_64-msi"]) {
            platforms["windows-x86_64"] = platforms["windows-x86_64-msi"];
          }
          delete platforms["windows-x86_64-nsis"];

          const windows = platforms["windows-x86_64"];
          if (!windows || typeof windows !== "object") {
            throw new Error("latest.json is missing windows-x86_64 after MSI sanitization");
          }
          if (String(windows.url || "").toLowerCase().includes("setup.exe")) {
            throw new Error("windows-x86_64 still points to the NSIS setup.exe");
          }

          fs.writeFileSync(path, `${JSON.stringify(manifest, null, 2)}\n`);
          NODE

      - name: Upload sanitized updater manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" release-manifest/latest.json --clobber --repo "${GITHUB_REPOSITORY}"

      - name: Delete stale NSIS release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mapfile -t asset_ids < <(
            gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${GITHUB_REF_NAME}" \
              --jq '.assets[] | select(.name | ascii_downcase | test("(_x64-setup\\.exe(\\.sig)?$|nsis)")) | .id'
          )

          for asset_id in "${asset_ids[@]}"; do
            gh api --method DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/${asset_id}"
          done
